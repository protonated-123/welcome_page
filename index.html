<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Falling Stars with Kranky WELCOME</title>
<link href="https://fonts.googleapis.com/css2?family=Kranky&display=swap" rel="stylesheet" media="all">
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Kranky', serif;
  font-display: swap;
}

/* falling stars */
.star {
  position: absolute;
  top: -20px;
  font-size: 8px;
  color: white;
  pointer-events: none;
}

/* horizontal glow at bottom */
.glow {
  position: absolute;
  height: 0.5px;
  width: 200px;
  background:
    radial-gradient(ellipse 100px 3px at center, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 30%),
    linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 49.8%, rgba(255,255,255,1) 50.2%, rgba(255,255,255,0) 100%);
  filter: blur(0.7px);
  opacity: 1;
  pointer-events: none;
}

/* WELCOME text */
#welcome {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 70px;
  letter-spacing: 8px;
  display: flex;
}

#welcome span {
  display: inline-block;
  transform-origin: center;
}
</style>
</head>
<body>

<div id="welcome">
  <span>W</span><span>E</span><span>L</span><span>C</span><span>O</span><span>M</span><span>E</span><span>!</span>
</div>

<script>

/* ---------------- SOUND SETUP ---------------- */

// ADD SOUND FOR LETTERS
const letterSound = new Audio("chalksnap.mp3");
letterSound.volume = 0.2;

function playLetterSound(){
  letterSound.currentTime = 0;
  letterSound.play();
}

/* --------------------------------------------- */

const lineHeight = 40;
const stars = [];
const letters = Array.from(document.querySelectorAll("#welcome span"));
const letterData = [];

// Setup letter physics data
letters.forEach(letter => {
  letterData.push({
    el: letter,
    angle: 0,
    velocity: 0,
    damping: 0.85
  });
});

// Compute letter positions
function getLetterPositions() {
  return letters.map(letter => {
    const rect = letter.getBoundingClientRect();
    return { letter, x: rect.left, y: rect.top, width: rect.width, height: rect.height };
  });
}

// Create a star
function createStar() {
  const star = document.createElement("div");
  star.className = "star";
  star.textContent = "✦";

  const x = Math.random() * (window.innerWidth - 20);
  star.style.left = x + "px";

  const initialV = 0.3 + Math.random() * 0.2;
  const acceleration = 0.002 + Math.random() * 0.002;
  const y = -20;

  document.body.appendChild(star);
  stars.push({ star, x, y, v: initialV, a: acceleration });
}

// Horizontal glow effect at bottom
function horizontalGlow(x, y) {
  const glow = document.createElement("div");
  glow.className = "glow";
  glow.style.left = (x - 100) + "px";
  glow.style.top = y + "px";
  document.body.appendChild(glow);

  setTimeout(() => glow.remove(), 100);
}

// Update letters physics
function updateLetters() {
  letterData.forEach(ld => {
    if (Math.abs(ld.angle) > 0.01 || Math.abs(ld.velocity) > 0.01) {
      const k = 0.15;
      const torque = -k * ld.angle;
      ld.velocity += torque;
      ld.velocity *= ld.damping; 
      ld.angle += ld.velocity;
      ld.el.style.transform = `rotate(${ld.angle}rad)`;
    }
  });
}

// Check collisions and apply tilt
function checkCollisions() {
  const letterPos = getLetterPositions();
  stars.forEach(s => {
    letterPos.forEach((lp, i) => {
      if (
        s.x >= lp.x && s.x <= lp.x + lp.width &&
        s.y >= lp.y && s.y <= lp.y + lp.height
      ) {

        letterData[i].velocity += (Math.random() - 0.5) * 0.5;

        // PLAY SOUND WHEN STAR HITS LETTER
        playLetterSound();

        s.v *= 0.95;
      }
    });
  });
}

// Update stars
function updateStars() {
  const toRemove = [];

  stars.forEach((s, idx) => {
    s.v += s.a * 8;
    s.y += s.v * 8;
    s.star.style.top = s.y + "px";
  });

  stars.forEach((s, idx) => {
    if (s.y >= window.innerHeight - lineHeight) {

      horizontalGlow(s.x, window.innerHeight - lineHeight);

      s.star.remove();
      toRemove.push(idx);
    }
  });

  for (let i = toRemove.length - 1; i >= 0; i--) stars.splice(toRemove[i], 1);
}

// Animation loop
function animate() {
  updateStars();
  checkCollisions();
  updateLetters();
  requestAnimationFrame(animate);
}

// Start stars and animation
setInterval(createStar, 600);
requestAnimationFrame(animate);

</script>

</body>
</html>
